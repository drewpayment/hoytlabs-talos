apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-config-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: sonarr-storage
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/appdata/media/sonarr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-config
  namespace: sonarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: sonarr-storage
  resources:
    requests:
      storage: 10Gi
---
# Single mount of the whole plex share. Downloads + Movies + Television
# are all directories within ONE ZFS dataset, so hardlinks work across
# them. Mounted at /data so Sonarr imports hardlink instead of copy
# (previously /downloads and /tv were separate NFS exports, which
# forced full copies and doubled disk usage).
apiVersion: v1
kind: PersistentVolume
metadata:
  name: sonarr-media-pv
spec:
  capacity:
    storage: 6Ti
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: sonarr-storage
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/plex
  claimRef:
    namespace: sonarr
    name: sonarr-media
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sonarr-media
  namespace: sonarr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: sonarr-storage
  volumeName: sonarr-media-pv
  resources:
    requests:
      storage: 6Ti
