apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-frontend
  namespace: mission-control
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: mission-control-frontend
  template:
    metadata:
      labels:
        app: mission-control-frontend
    spec:
      serviceAccountName: mission-control
      containers:
        - name: frontend
          image: ghcr.io/drewpayment/openclaw-mission-control-frontend:latest
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://mission-control-api.hoytlabs.app"
            - name: NEXT_PUBLIC_AUTH_MODE
              value: "clerk"
            - name: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: clerk_publishable_key
            - name: CLERK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: mission-control-secret
                  key: clerk_secret_key
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
