apiVersion: apps/v1
kind: Deployment
metadata:
  name: mission-control-redis
  namespace: mission-control
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mission-control-redis
  template:
    metadata:
      labels:
        app: mission-control-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
