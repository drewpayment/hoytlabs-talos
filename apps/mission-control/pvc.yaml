apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: mission-control-storage
provisioner: nfs.csi.k8s.io
parameters:
  server: "192.168.86.44"
  share: "/mnt/tank/appdata/mission-control/postgres"
reclaimPolicy: Retain
volumeBindingMode: Immediate

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mission-control-postgres-pv
  namespace: mission-control
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: mission-control-storage
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/appdata/mission-control/postgres

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mission-control-postgres-pvc
  namespace: mission-control
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: mission-control-storage
  resources:
    requests:
      storage: 10Gi
  volumeName: mission-control-postgres-pv
