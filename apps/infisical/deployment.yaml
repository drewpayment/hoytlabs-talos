apiVersion: apps/v1
kind: Deployment
metadata:
  name: infisical
  namespace: infisical
  labels:
    app: infisical
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: infisical
  template:
    metadata:
      labels:
        app: infisical
    spec:
      initContainers:
        # Block startup until the bundled Postgres is accepting connections so
        # the migration step below doesn't fail on a cold start.
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z infisical-postgres 5432; do echo 'waiting for postgres'; sleep 2; done"
        # The standalone Infisical entrypoint does NOT run migrations, so we run
        # them explicitly. This is idempotent and re-runs on every rollout/upgrade.
        - name: migration
          image: infisical/infisical:v0.160.7
          command: ["npm", "run", "migration:latest"]
          envFrom:
            - configMapRef:
                name: infisical-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: infisical-config
                  key: POSTGRES_DB
            - name: DB_CONNECTION_URI
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@infisical-postgres:5432/$(POSTGRES_DB)"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: encryption_key
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: auth_secret
      containers:
        - name: infisical
          image: infisical/infisical:v0.160.7
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: infisical-config
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: postgres_user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: postgres_password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: infisical-config
                  key: POSTGRES_DB
            - name: DB_CONNECTION_URI
              value: "postgresql://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@infisical-postgres:5432/$(POSTGRES_DB)"
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: encryption_key
            - name: AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: infisical-secret
                  key: auth_secret
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
