apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dozzle-auth
  namespace: dozzle
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-cluster-secret-store
  target:
    name: dozzle-auth
  data:
    # Full contents of a Dozzle users.yml file (see README / generate command).
    - secretKey: users.yml
      remoteRef:
        key: DOZZLE_USERS_YML
