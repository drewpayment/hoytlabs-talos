apiVersion: v1
kind: PersistentVolume
metadata:
  name: seerr-config-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: seerr-storage
  # Same NFS path as the old Overseerr install so the existing config + DB
  # are reused. Seerr auto-migrates the Overseerr DB on first start.
  nfs:
    server: 192.168.86.44
    path: /mnt/tank/appdata/media/overseerr
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seerr-config
  namespace: seerr
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: seerr-storage
  resources:
    requests:
      storage: 10Gi
